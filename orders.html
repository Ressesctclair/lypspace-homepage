<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — lypspace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --white: #ffffff;
      --gray: #6b6b6b;
      --light-gray: #f5f5f5;
      --border: #e0e0e0;
      --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      font-size: 14px;
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 60px;
    }

    .logo {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    nav {
      display: flex;
      gap: 36px;
      align-items: center;
    }

    nav a {
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--black);
    }

    nav button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--black);
      font-family: var(--font);
      padding: 0;
    }

    nav button:hover { text-decoration: underline; }

    /* ── CONTENT ─────────────────────────────────────────── */
    .wrap {
      max-width: 800px;
      margin: 48px auto;
      padding: 0 40px;
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 32px;
      letter-spacing: 0.02em;
    }

    .card {
      border: 1px solid var(--border);
      padding: 22px;
      margin-bottom: 14px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .date {
      font-size: 12px;
      color: var(--gray);
    }

    .right {
      text-align: right;
    }

    .amt {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .chip {
      font-size: 11px;
      padding: 2px 8px;
      border: 1px solid;
      display: inline-block;
      letter-spacing: 0.04em;
    }

    .chip.shipped { border-color: var(--black); color: var(--black); }
    .chip.processing { border-color: var(--border); color: var(--gray); }

    .items {
      font-size: 14px;
      color: #444;
      margin-bottom: 10px;
    }

    .tracking {
      font-size: 13px;
      background: var(--light-gray);
      padding: 10px 14px;
      color: var(--gray);
      letter-spacing: 0.02em;
    }

    .empty {
      font-size: 14px;
      color: var(--gray);
    }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 768px) {
      header { padding: 0 20px; }
      nav { gap: 20px; }
      .wrap { padding: 0 20px; margin: 32px auto; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="/" class="logo">LYP SPACE</a>
    <nav>
      <a href="/">Home</a>
      <a href="/catalog">Catalog</a>
      <a href="/dashboard">账户</a>
      <a href="/profile">地址</a>
      <button onclick="logout()">退出登录</button>
    </nav>
  </header>

  <!-- CONTENT -->
  <div class="wrap">
    <h1>订单历史</h1>
    <div id="list"><p class="empty">加载中…</p></div>
  </div>

  <script>
    function esc(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function logout() {
      await fetch('/api/auth/logout');
      location.href = '/';
    }

    async function init() {
      const mr = await fetch('/api/auth/me');
      if (!mr.ok) { location.href = '/login'; return; }

      const or = await fetch('/api/user/orders');
      const { orders } = await or.json();
      const el = document.getElementById('list');

      if (!orders || !orders.length) {
        el.innerHTML = '<p class="empty">暂无订单记录</p>';
        return;
      }

      el.innerHTML = orders.map(o => `
        <div class="card">
          <div class="top">
            <div class="date">${new Date(o.date).toLocaleDateString('zh-CN')}</div>
            <div class="right">
              <div class="amt">¥${(o.amount / 100).toFixed(2)}</div>
              <span class="chip ${o.status === 'shipped' ? 'shipped' : 'processing'}">${o.status === 'shipped' ? '已发货' : '处理中'}</span>
            </div>
          </div>
          <div class="items">${esc(o.items.map(i => i.name + (i.quantity > 1 ? ' × ' + i.quantity : '')).join(' · '))}</div>
          ${o.tracking ? `<div class="tracking">快递：${esc(o.tracking.carrier)} &nbsp;·&nbsp; 单号：${esc(o.tracking.number)}</div>` : ''}
        </div>`).join('');
    }

    init();
  </script>
</body>
</html>
