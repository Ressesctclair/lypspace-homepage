<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Product — LYP SPACE</title>
  <script src="/js/i18n.js"></script>
  <script src="/js/cart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --white: #ffffff;
      --gray: #6b6b6b;
      --light-gray: #f5f5f5;
      --border: #e0e0e0;
      --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      font-size: 14px;
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 60px;
    }

    .logo {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    nav { display: flex; gap: 36px; }

    nav a {
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--black);
    }

    .header-icons {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .header-icons a {
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .breadcrumb {
      padding: 16px 40px;
      font-size: 12px;
      color: var(--gray);
      border-bottom: 1px solid var(--border);
    }

    .breadcrumb a { color: var(--gray); }
    .breadcrumb a:hover { color: var(--black); text-decoration: underline; }
    .breadcrumb span { margin: 0 8px; }

    .product-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 40px;
    }

    .main-image {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: linear-gradient(160deg, #ececec 0%, #d8d8d8 100%);
    }

    .product-info { padding-top: 8px; }

    .product-brand {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 12px;
    }

    .product-name {
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 0.02em;
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .product-price {
      font-size: 18px;
      margin-bottom: 32px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .product-description {
      font-size: 13px;
      color: var(--gray);
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .buy-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--black);
      color: var(--white);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.2s;
      text-align: center;
    }

    .buy-btn:hover { background: #333; }

    .product-details {
      margin-top: 40px;
      border-top: 1px solid var(--border);
      padding-top: 32px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .detail-label { color: var(--gray); }

    footer {
      margin-top: 80px;
      border-top: 1px solid var(--border);
      padding: 40px;
      text-align: center;
      font-size: 12px;
      color: var(--gray);
      letter-spacing: 0.06em;
    }

    @media (max-width: 768px) {
      .product-layout {
        grid-template-columns: 1fr;
        gap: 32px;
        padding: 24px 20px;
      }
      header { padding: 0 20px; }
      nav { display: none; }
      .breadcrumb { padding: 12px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="logo">LYP SPACE</a>
    <nav>
      <a href="/">Home</a>
      <a href="/catalog">Catalog</a>
      <a href="/contact">Contact</a>
    </nav>
    <div class="header-icons">
      <a href="/login">Sign in</a>
    </div>
  </header>

  <div class="breadcrumb">
    <a href="/" data-i18n="nav_home">Home</a><span>/</span>
    <a href="/catalog" data-i18n="nav_catalog">Catalog</a><span>/</span>
    Test Product
  </div>

  <div class="product-layout">
    <div class="main-image"></div>

    <div class="product-info">
      <p class="product-brand">LYP SPACE</p>
      <h1 class="product-name">Test Product</h1>
      <p class="product-price">$0.05 USD</p>

      <hr class="divider" />

      <p class="product-description">
        This is a test product used to verify the checkout and payment flow. No physical item will be shipped.
      </p>

      <!-- Quantity selector -->
      <div style="margin-bottom:32px;">
        <p style="font-size:12px;color:#6b6b6b;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;" data-i18n="prod_qty_label">Quantity</p>
        <div style="display:flex;align-items:center;gap:0;border:1px solid #e0e0e0;width:fit-content;">
          <button onclick="changeQty(-1)" style="width:40px;height:40px;background:none;border:none;font-size:18px;cursor:pointer;color:#111;">−</button>
          <span id="qty-display" style="width:40px;text-align:center;font-size:14px;">1</span>
          <button onclick="changeQty(1)" style="width:40px;height:40px;background:none;border:none;font-size:18px;cursor:pointer;color:#111;">+</button>
        </div>
      </div>

      <button class="buy-btn" onclick="addToCart()" style="background:#fff;color:#111;border:1px solid #111;margin-bottom:12px;">Add to Cart</button>
      <button class="buy-btn" onclick="goToCheckout()">Buy Now — $0.05</button>

      <div class="product-details">
        <div class="detail-row">
          <span class="detail-label">Type</span>
          <span>Test</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Price</span>
          <span>$0.05 USD</span>
        </div>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2026 LYP SPACE
  </footer>

  <script>
    let qty = 1;

    function changeQty(delta) {
      qty = Math.max(1, qty + delta);
      document.getElementById('qty-display').textContent = qty;
    }

    function addToCart() {
      Cart.add({ price_id: 'price_1TkGPN4IZcEaiWjkNLV0xOKH', name: 'Test Product', price: 0.05, qty: qty });
    }

    function goToCheckout() {
      const name = encodeURIComponent('Test Product');
      window.location.href = '/checkout?price_id=price_1TkGPN4IZcEaiWjkNLV0xOKH&name=' + name + '&qty=' + qty;
    }
  </script>

</body>
</html>
