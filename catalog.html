<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog — LYP SPACE</title>
  <script src="/js/i18n.js"></script>
  <script src="/js/cart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #111111; --white: #ffffff; --gray: #6b6b6b;
      --light-gray: #f5f5f5; --border: #e0e0e0;
      --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    body { font-family: var(--font); background: var(--white); color: var(--black); font-size: 14px; line-height: 1.6; }
    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--white); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 60px;
    }
    .logo { font-size: 15px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
    nav { display: flex; gap: 36px; }
    nav a { font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--black); }
    .header-icons { display: flex; align-items: center; gap: 20px; }
    .header-icons a { font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; }

    .page-header {
      padding: 48px 40px 32px;
      border-bottom: 1px solid var(--border);
    }
    .page-header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gray); }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      padding: 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .product-card { cursor: pointer; }
    .product-image {
      width: 100%; aspect-ratio: 3 / 4;
      background: var(--light-gray); margin-bottom: 16px;
      overflow: hidden;
    }
    .product-image img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
    .product-image-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #ececec 0%, #d8d8d8 100%);
      transition: transform 0.4s ease;
    }
    .product-card:hover .product-image img,
    .product-card:hover .product-image-placeholder { transform: scale(1.03); }
    .product-name { font-size: 13px; margin-bottom: 4px; letter-spacing: 0.02em; }
    .product-price { font-size: 13px; color: var(--gray); }

    footer {
      margin-top: 80px; border-top: 1px solid var(--border);
      padding: 40px; text-align: center;
      font-size: 12px; color: var(--gray); letter-spacing: 0.06em;
    }

    @media (max-width: 1024px) { .catalog-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) {
      header { padding: 0 20px; }
      nav { display: none; }
      .catalog-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 20px; }
      .page-header { padding: 32px 20px 24px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="logo">LYP SPACE</a>
    <nav>
      <a href="/" data-i18n="nav_home">Home</a>
      <a href="/catalog" data-i18n="nav_catalog">Catalog</a>
      <a href="/contact" data-i18n="nav_contact">Contact</a>
    </nav>
    <div class="header-icons">
      <a href="/login">Sign in</a>
    </div>
  </header>

  <div class="page-header">
    <h1 data-i18n="nav_catalog">All Products</h1>
  </div>

  <div class="catalog-grid">
    <a href="/rip-curl-bikini" class="product-card" style="display:block;">
      <div class="product-image">
        <img src="/images/rip-curl-bikini.jpg" alt="Rip Curl Striped Bikini" />
      </div>
      <p class="product-name">Rip Curl Striped Bikini</p>
      <p class="product-price">$126.00</p>
    </a>

    <a href="/test-product" class="product-card" style="display:block;">
      <div class="product-image">
        <div class="product-image-placeholder"></div>
      </div>
      <p class="product-name">Test Product</p>
      <p class="product-price">$0.05</p>
    </a>
  </div>

  <footer>&copy; 2026 LYP SPACE</footer>

</body>
</html>
