<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog — LYP SPACE</title>
  <script src="/js/i18n.js" defer></script>
  <script src="/js/cart.js" defer></script>
  <script src="/js/pannable.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #111111; --white: #ffffff; --bg: #f5f0e6; --gray: #6b6b6b;
      --light-gray: #ede8da; --border: #ddd8cc;
      --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--black); font-size: 14px; line-height: 1.6; }
    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 60px;
    }
    .logo { font-size: 15px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
    nav { display: flex; gap: 36px; }
    nav a { font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--black); }
    .header-icons { display: flex; align-items: center; gap: 20px; }
    .header-icons a { font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
    .search-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; color: var(--black); }
    .search-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    #search-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,.5); align-items: flex-start; justify-content: center; padding-top: 80px; }
    #search-overlay.open { display: flex; }
    #search-box { background: var(--white); width: 100%; max-width: 560px; margin: 0 20px; border-radius: 2px; display: flex; align-items: center; padding: 0 16px; height: 52px; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
    #search-box svg { width: 18px; height: 18px; stroke: var(--gray); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    #search-input { flex: 1; border: none; outline: none; font-size: 15px; font-family: var(--font); padding: 0 12px; background: transparent; color: var(--black); }
    #search-input::placeholder { color: var(--gray); }
    #search-close { background: none; border: none; cursor: pointer; padding: 4px; color: var(--gray); font-size: 20px; line-height: 1; }

    .page-header {
      padding: 32px 40px 0;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
    }
    .page-header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gray); }
    .product-count { font-size: 12px; color: var(--gray); }

    .filter-bar {
      padding: 16px 40px 0;
      display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0; padding: 6px 14px;
      background: none; border: 1px solid var(--border);
      font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; font-family: var(--font); color: var(--gray);
      white-space: nowrap; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--black); color: var(--black); }
    .filter-btn.active { background: var(--black); border-color: var(--black); color: var(--white); }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      padding: 32px 40px 80px;
    }
    .product-card { cursor: pointer; display: block; }
    .product-card:hover { text-decoration: none; }
    .product-image { width: 100%; aspect-ratio: 3/4; background: var(--light-gray); margin-bottom: 12px; overflow: hidden; position: relative; cursor: grab; }
    .product-image img { width: 100%; height: 100%; display: block; object-fit: cover; object-position: 50% 50%; user-select: none; -webkit-user-drag: none; }
    .sold-out-badge {
      position: absolute; inset: 0; background: rgba(245,240,230,0.72);
      display: flex; align-items: center; justify-content: center;
    }
    .sold-out-badge span {
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      background: var(--black); color: var(--white); padding: 6px 14px;
    }
    .product-name { font-size: 13px; margin-bottom: 4px; letter-spacing: 0.02em; }
    .product-price { font-size: 13px; color: var(--gray); }
    .product-type { font-size: 11px; color: var(--gray); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }

    .no-results { padding: 80px 40px; text-align: center; font-size: 13px; color: var(--gray); letter-spacing: 0.06em; }
    .loading { padding: 80px 40px; text-align: center; font-size: 13px; color: var(--gray); }
    #pagination { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 32px 40px 48px; flex-wrap: wrap; }
    .pg-btn { background: none; border: 1px solid var(--border); padding: 8px 14px; font-size: 13px; cursor: pointer; font-family: var(--font); color: var(--black); letter-spacing: 0.04em; transition: all 0.15s; min-width: 40px; }
    .pg-btn:hover:not(:disabled) { border-color: var(--black); }
    .pg-btn.active { background: var(--black); border-color: var(--black); color: var(--white); }
    .pg-btn:disabled { opacity: 0.3; cursor: default; }
    .pg-ellipsis { padding: 8px 6px; font-size: 13px; color: var(--gray); }

    footer {
      margin-top: 0; border-top: 1px solid var(--border);
      padding: 40px; text-align: center;
      font-size: 12px; color: var(--gray); letter-spacing: 0.06em;
    }

    @media (max-width: 1100px) { .catalog-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) {
      header { padding: 0 20px; }
      nav { display: none; }
      .page-header { padding: 20px 16px 0; }
      .filter-bar { padding: 12px 16px 0; }
      .catalog-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px 16px 60px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="logo">LYP SPACE</a>
    <nav>
      <a href="/" data-i18n="nav_home">Home</a>
      <a href="/catalog" data-i18n="nav_catalog">Catalog</a>
      <a href="/contact" data-i18n="nav_contact">Contact</a>
    </nav>
    <div class="header-icons">
      <button class="search-btn" onclick="openSearch()" aria-label="Search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <a href="/login" id="signin-link">Sign in</a>
    </div>
  </header>

  <div id="search-overlay" onclick="closeSearch(event)">
    <div id="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="text" placeholder="Search products…" autocomplete="off" onkeydown="handleSearchKey(event)">
      <button id="search-close" onclick="closeSearch()" aria-label="Close">&#x2715;</button>
    </div>
  </div>

  <div class="page-header">
    <h1 id="catalog-title">All Products</h1>
    <span class="product-count" id="product-count"></span>
  </div>

  <div class="filter-bar" id="filter-bar"></div>

  <div class="catalog-grid" id="catalog-grid">
    <div class="loading" style="grid-column:1/-1">Loading…</div>
  </div>

  <div id="pagination"></div>

  <div style="display:none">
    <button onclick="exportCSV()">Export products CSV</button>
  </div>

  <footer>&copy; 2026 LYP SPACE</footer>

  <script>
    let allProducts = [];
    let inventoryMap = {};
    let activeCategory = 'All';
    let searchTerm = '';
    let currentPage = 1;
    const PAGE_SIZE = 24;

    async function loadProducts() {
      const [prodRes, invRes, customRes] = await Promise.all([
        fetch('/products.json'),
        fetch('/api/checkout?action=inventory').catch(() => null),
        fetch('/api/checkout?action=products' + (localStorage.getItem('lypspace_admin_pw') ? '&pw=' + encodeURIComponent(localStorage.getItem('lypspace_admin_pw')) : '')).catch(() => null)
      ]);
      allProducts = await prodRes.json();
      if (customRes && customRes.ok) {
        const cd = await customRes.json();
        const customs = (cd.products || []).map(p => ({ ...p, images: p.images || [], variants: p.variants || [], _custom: true }));
        allProducts = [...customs, ...allProducts];
      }
      if (invRes && invRes.ok) {
        const inv = await invRes.json();
        inventoryMap = inv.inventory || {};
      }
      buildFilters();
      render();
    }

    function isSoldOut(p) {
      const ov = inventoryMap[p.handle];
      if (ov && 'in_stock' in ov) return !ov.in_stock;
      return p.total_qty <= 0;
    }

    function buildFilters() {
      const counts = {};
      allProducts.forEach(p => {
        const t = p.type || 'Other';
        counts[t] = (counts[t] || 0) + 1;
      });
      const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).map(([t]) => t);
      // Pin Men's at position 3 (after All + top category)
      const PINNED1 = "Men's";
      const PINNED2 = "Sunglasses";
      const without = sorted.filter(t => t !== PINNED1 && t !== PINNED2);
      const ordered = ['All', without[0], PINNED1, PINNED2, ...without.slice(1)].filter(Boolean);
      const bar = document.getElementById('filter-bar');
      bar.innerHTML = '';
      ordered.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (cat === activeCategory ? ' active' : '');
        btn.textContent = cat;
        btn.onclick = () => setCategory(cat);
        bar.appendChild(btn);
      });
    }

    function setCategory(cat) {
      activeCategory = cat;
      currentPage = 1;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b.textContent === cat);
      });
      render();
    }

    function render() {
      let products = allProducts;
      if (activeCategory !== 'All') {
        products = products.filter(p => (p.type || 'Other') === activeCategory);
      }
      if (searchTerm) {
        const q = searchTerm.toLowerCase();
        products = products.filter(p =>
          p.title.toLowerCase().includes(q) || (p.type || '').toLowerCase().includes(q)
        );
      }
      const totalPages = Math.ceil(products.length / PAGE_SIZE);
      if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
      const start = (currentPage - 1) * PAGE_SIZE;
      const pageProducts = products.slice(start, start + PAGE_SIZE);

      const grid = document.getElementById('catalog-grid');
      document.getElementById('product-count').textContent = products.length + ' products';
      if (!products.length) {
        grid.innerHTML = '<div class="no-results" style="grid-column:1/-1">No products found.</div>';
        renderPagination(0, 1);
        return;
      }
      grid.innerHTML = pageProducts.map(p => {
        const img = p.images[0] || '';
        const price = p.price > 0 ? '$' + p.price.toFixed(2) : '';
        const soldOut = isSoldOut(p);
        return `<a href="/product?h=${p.handle}" class="product-card">
          <div class="product-image">
            ${img ? `<img src="${img}" alt="${esc(p.title)}" loading="lazy">` : ''}
            ${soldOut ? `<div class="sold-out-badge"><span>Sold Out</span></div>` : ''}
          </div>
          <p class="product-type">${esc(p.type || '')}</p>
          <p class="product-name">${esc(p.title)}</p>
          ${price ? `<p class="product-price">${soldOut ? '<s>' + price + '</s>' : price}</p>` : ''}
        </a>`;
      }).join('');
      renderPagination(totalPages, currentPage);
      if (window.pannableSetup) window.pannableSetup();
    }

    function renderPagination(totalPages, page) {
      const el = document.getElementById('pagination');
      if (totalPages <= 1) { el.innerHTML = ''; return; }
      let html = '';
      html += `<button class="pg-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>←</button>`;
      const range = [];
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= page-2 && i <= page+2)) range.push(i);
        else if (range[range.length-1] !== '…') range.push('…');
      }
      range.forEach(r => {
        if (r === '…') html += `<span class="pg-ellipsis">…</span>`;
        else html += `<button class="pg-btn${r===page?' active':''}" onclick="goPage(${r})">${r}</button>`;
      });
      html += `<button class="pg-btn" onclick="goPage(${page+1})" ${page===totalPages?'disabled':''}>→</button>`;
      el.innerHTML = html;
    }

    function goPage(n) {
      currentPage = n;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function openSearch() {
      document.getElementById('search-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
      setTimeout(() => document.getElementById('search-input').focus(), 50);
    }
    function closeSearch(e) {
      if (e && e.target !== document.getElementById('search-overlay')) return;
      document.getElementById('search-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }
    function handleSearchKey(e) {
      if (e.key === 'Escape') { closeSearch(); return; }
      if (e.key === 'Enter') {
        searchTerm = document.getElementById('search-input').value.trim();
        currentPage = 1;
        closeSearch();
        document.getElementById('catalog-title').textContent = searchTerm ? `Results for "${searchTerm}"` : 'All Products';
        render();
      }
    }

    const urlParams = new URLSearchParams(location.search);
    const qParam = urlParams.get('q');
    if (qParam) {
      searchTerm = qParam;
      document.getElementById('catalog-title').textContent = `Results for "${qParam}"`;
    }
    const catParam = urlParams.get('cat');
    if (catParam) {
      activeCategory = catParam;
      document.getElementById('catalog-title').textContent = catParam;
    }

    function exportCSV() {
      if (!allProducts.length) { alert('Products not loaded yet.'); return; }
      const headers = ['Handle','Title','Type','Price','Description','Images','Variants'];
      const rows = allProducts.map(p => [
        p.handle, p.title, p.type||'', p.price,
        (p.description||'').replace(/"/g,'""'),
        p.images.join(' | '),
        p.variants.map(v=>`${v.option1_name}:${v.option1_value}=$${v.price}`).join(' | ')
      ]);
      const csv = [headers,...rows].map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
      a.download = 'lyp-space-products.csv';
      a.click();
    }

    loadProducts();

    (async () => {
      const r = await fetch('/api/auth/me', { cache: 'no-store' });
      const link = document.getElementById('signin-link');
      if (r.ok && link) { link.textContent = 'My Account'; link.href = '/dashboard'; }
    })();
  </script>
</body>
</html>
