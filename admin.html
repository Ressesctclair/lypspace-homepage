<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>发货管理 - LYP SPACE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Helvetica Neue, Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card { background: #fff; padding: 48px; width: 100%; max-width: 480px; }
    h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 32px; }
    label { display: block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #6b6b6b; margin-top: 20px; margin-bottom: 6px; }
    input, select {
      width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0;
      font-size: 14px; font-family: inherit; outline: none; background: #fff; appearance: none;
    }
    input:focus, select:focus { border-color: #111; }
    button {
      margin-top: 32px; width: 100%; padding: 14px; background: #111; color: #fff;
      border: none; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
      font-family: inherit; cursor: pointer; transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #333; }
    button:disabled { background: #999; cursor: not-allowed; }
    .msg { margin-top: 16px; font-size: 13px; text-align: center; min-height: 20px; }
    .msg.ok { color: #2a7a2a; }
    .msg.err { color: #c0392b; }
  </style>
</head>
<body>
  <div class="card">
    <div style="margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #eee;">
      <a href="/" style="display:inline-block;margin-bottom:14px;font-size:13px;color:#111;text-decoration:none;">← 返回主页</a><br>
      <a href="/admin-products" style="display:inline-block;padding:10px 20px;background:#111;color:#fff;font-size:11px;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;margin-right:12px;">产品管理（库存/价格/简介）→</a>
      <a href="/admin-settings" style="display:inline-block;padding:10px 20px;background:#444;color:#fff;font-size:11px;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;margin-right:12px;">Homepage Settings →</a>
      <a href="/admin-orders" style="display:inline-block;padding:10px 20px;background:#1a4f7a;color:#fff;font-size:11px;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;margin-right:12px;">订单管理 →</a>
      <div style="margin-top:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input type="password" id="export-pw" placeholder="管理员密码" style="padding:10px 12px;border:1px solid #e0e0e0;font-size:13px;width:180px;">
        <button onclick="exportData()" style="padding:10px 20px;background:#1a6e3c;color:#fff;border:none;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;">导出全部数据 ↓</button>
      </div>
    </div>
    <script>
    async function exportData() {
      const pw = document.getElementById('export-pw').value.trim();
      if (!pw) { alert('请输入管理员密码'); return; }
      const r = await fetch('/api/checkout?action=export&password=' + encodeURIComponent(pw));
      if (!r.ok) { alert('密码错误，请重试'); return; }
      const data = await r.json();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'lypspace-export-' + new Date().toISOString().slice(0,10) + '.json';
      a.click();
    }
    window.addEventListener('DOMContentLoaded', function prefillFromUrl() {
      const params = new URLSearchParams(location.search);
      const sid = params.get('session_id');
      const email = params.get('email');
      if (sid) document.getElementById('stripeSessionId').value = sid;
      if (email) document.getElementById('customerEmail').value = email;
    });
    </script>

    <!-- Admin account management -->
    <div style="margin-bottom:32px;padding:20px;background:#f9f9f9;border:1px solid #eee;">
      <h2 style="font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;">管理员账号</h2>
      <p style="font-size:12px;color:#666;margin-bottom:12px;">拥有管理员权限的邮箱（登录后台台面板会显示"管理后台"按钮）</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;">
        <div>
          <label style="display:block;font-size:11px;color:#888;margin-bottom:4px;">管理员密码</label>
          <input type="password" id="admin-mgmt-pw" placeholder="••••••••" style="padding:9px 12px;border:1px solid #e0e0e0;font-size:13px;width:160px;">
        </div>
        <div>
          <label style="display:block;font-size:11px;color:#888;margin-bottom:4px;">新增管理员邮箱</label>
          <input type="email" id="new-admin-email" placeholder="new@example.com" style="padding:9px 12px;border:1px solid #e0e0e0;font-size:13px;width:220px;">
        </div>
        <button onclick="addAdminEmail()" style="padding:9px 18px;background:#111;color:#fff;border:none;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;">添加</button>
      </div>
      <div id="admin-emails-list" style="margin-top:12px;font-size:12px;color:#444;"></div>
      <div id="admin-mgmt-msg" style="margin-top:8px;font-size:12px;"></div>
    </div>
    <script>
    (async function loadAdminEmails() {
      const r = await fetch('/api/checkout?action=settings');
      const { settings } = await r.json();
      const emails = JSON.parse(settings.admin_emails || '[]');
      const builtin = ['imlorennn888@gmail.com', 'support@lypspace.digital'];
      const all = [...new Set([...builtin, ...emails])];
      document.getElementById('admin-emails-list').innerHTML =
        '<strong style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#888;">当前管理员：</strong> ' +
        all.map(e => '<span style="display:inline-block;padding:2px 10px;background:#111;color:#fff;font-size:11px;margin:2px 4px 2px 0;">' + e + '</span>').join('');
    })();

    async function addAdminEmail() {
      const pw = document.getElementById('admin-mgmt-pw').value.trim();
      const email = document.getElementById('new-admin-email').value.trim();
      const msg = document.getElementById('admin-mgmt-msg');
      if (!pw || !email) { msg.textContent = '请填写密码和邮箱'; msg.style.color = '#c00'; return; }
      const sr = await fetch('/api/checkout?action=settings');
      const { settings } = await sr.json();
      const current = JSON.parse(settings.admin_emails || '[]');
      if (current.includes(email)) { msg.textContent = '该邮箱已是管理员'; msg.style.color = '#888'; return; }
      current.push(email);
      const r = await fetch('/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'save-setting', password: pw, key: 'admin_emails', value: JSON.stringify(current) }),
      });
      if (!r.ok || !(await r.json()).ok) { msg.textContent = '密码错误或保存失败'; msg.style.color = '#c00'; return; }
      msg.textContent = '✓ 已添加 ' + email;
      msg.style.color = '#1a7f37';
      document.getElementById('new-admin-email').value = '';
      loadAdminEmails();
    }
    </script>

    <h1>发货通知</h1>
    <form id="form">
      <label>管理员密码</label>
      <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password" />

      <label>客户邮箱</label>
      <input type="email" id="customerEmail" required placeholder="customer@example.com" />

      <label>快递公司</label>
      <select id="carrier" required>
        <option value="">Select carrier</option>
        <option>UPS</option>
        <option>FedEx</option>
        <option>DHL</option>
        <option>USPS</option>
        <option>Royal Mail</option>
        <option>Canada Post</option>
        <option>Australia Post</option>
        <option>Other</option>
      </select>

      <label>快递单号</label>
      <input type="text" id="trackingNumber" required placeholder="SF1234567890" />

      <div style="margin-bottom:16px;">
        <label style="display:block;margin-bottom:6px;font-size:13px;color:#666;">Stripe Session ID（可选）</label>
        <input id="stripeSessionId" type="text" placeholder="cs_live_..." style="width:100%;padding:12px;border:1px solid #e5e5e5;font-size:14px;outline:none;">
      </div>

      <label>订单备注（可选）</label>
      <input type="text" id="orderRef" placeholder="订单编号或备注" />

      <button type="submit" id="btn">发送物流通知</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');
      btn.disabled = true;
      btn.textContent = '发送中...';
      msg.textContent = '';
      msg.className = 'msg';

      try {
        const res = await fetch('/api/ship', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            password: document.getElementById('password').value,
            customerEmail: document.getElementById('customerEmail').value,
            carrier: document.getElementById('carrier').value,
            trackingNumber: document.getElementById('trackingNumber').value,
            stripeSessionId: document.getElementById('stripeSessionId').value || undefined,
            orderRef: document.getElementById('orderRef').value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          msg.textContent = '✓ 物流通知已发送至客户邮箱';
          msg.classList.add('ok');
          document.getElementById('customerEmail').value = '';
          document.getElementById('carrier').value = '';
          document.getElementById('trackingNumber').value = '';
          document.getElementById('stripeSessionId').value = '';
          document.getElementById('orderRef').value = '';
        } else {
          msg.textContent = data.error || '发送失败，请重试';
          msg.classList.add('err');
        }
      } catch {
        msg.textContent = '网络错误，请检查连接后重试';
        msg.classList.add('err');
      }

      btn.disabled = false;
      btn.textContent = '发送物流通知';
    });
  </script>

  <hr style="margin:40px 0;border:none;border-top:1px solid #e5e5e5;">
  <div style="max-width:480px;margin:0 auto;padding:0 24px 40px;">
    <h2 style="font-size:18px;font-weight:600;margin-bottom:24px;">会员管理</h2>
    <div style="margin-bottom:16px;">
      <label style="display:block;margin-bottom:6px;font-size:13px;color:#666;">管理员密码</label>
      <input id="m-pw" type="password" style="width:100%;padding:12px;border:1px solid #e5e5e5;font-size:14px;outline:none;">
    </div>
    <div style="margin-bottom:16px;">
      <label style="display:block;margin-bottom:6px;font-size:13px;color:#666;">用户邮箱</label>
      <input id="m-email" type="email" style="width:100%;padding:12px;border:1px solid #e5e5e5;font-size:14px;outline:none;" placeholder="user@example.com">
    </div>
    <div style="margin-bottom:16px;">
      <label style="display:block;margin-bottom:8px;font-size:13px;color:#666;">会员状态</label>
      <label style="margin-right:20px;font-size:14px;"><input type="radio" name="m-status" value="true" checked> 设为会员</label>
      <label style="font-size:14px;"><input type="radio" name="m-status" value="false"> 取消会员</label>
    </div>
    <button onclick="setMember()" style="width:100%;padding:14px;background:#000;color:#fff;border:none;font-size:14px;cursor:pointer;">提交</button>
    <div id="m-msg" style="margin-top:12px;font-size:13px;display:none;"></div>
  </div>
  <script>
    async function setMember() {
      const msg = document.getElementById('m-msg');
      msg.style.display = 'none';
      const is_member = document.querySelector('input[name="m-status"]:checked').value === 'true';
      const r = await fetch('/api/admin/set-member', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          password: document.getElementById('m-pw').value,
          email: document.getElementById('m-email').value,
          is_member,
        }),
      });
      const d = await r.json();
      msg.textContent = r.ok ? '✓ 已更新' : (d.error || '失败');
      msg.style.color = r.ok ? '#080' : '#c00';
      msg.style.display = 'block';
      if (r.ok) document.getElementById('m-email').value = '';
    }
  </script>

  <!-- ── User List ─────────────────────────────────────── -->
  <section style="margin-top:40px;max-width:480px;margin-left:auto;margin-right:auto;padding:0 24px 40px;">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">
      <h2 style="font-size:18px;font-weight:600;">用户列表</h2>
      <button onclick="loadUsers()" style="padding:6px 14px;font-size:12px;background:#fff;border:1px solid #d0d0d0;cursor:pointer;text-transform:none;margin-top:0;width:auto;">刷新</button>
    </div>
    <div id="user-list" style="font-size:13px;color:#666;">（输入上方管理员密码后点刷新）</div>
  </section>

  <script>
    async function loadUsers() {
      const pw = document.getElementById('m-pw').value;
      if (!pw) { document.getElementById('user-list').textContent = '请先填写上方管理员密码'; return; }
      const el = document.getElementById('user-list');
      el.textContent = '加载中…';
      try {
        const r = await fetch('/api/admin/set-member?password=' + encodeURIComponent(pw));
        const d = await r.json();
        if (!d.users) { el.textContent = d.error || '加载失败'; return; }
        if (d.users.length === 0) { el.textContent = '暂无用户'; return; }
        el.innerHTML = '<table style="width:100%;border-collapse:collapse;font-size:13px;">'
          + '<tr style="border-bottom:2px solid #eee;text-align:left;"><th style="padding:8px 4px;">邮箱</th><th style="padding:8px 4px;">会员</th><th style="padding:8px 4px;">注册时间</th></tr>'
          + d.users.map(u => {
            const date = new Date(u.created_at).toLocaleDateString('zh-CN');
            const badge = u.is_member
              ? '<span style="color:#1a7f37;font-weight:600;">✓ 是</span>'
              : '<span style="color:#999;">否</span>';
            return '<tr style="border-bottom:1px solid #f0f0f0;">'
              + '<td style="padding:8px 4px;">' + escHtml(u.email) + '</td>'
              + '<td style="padding:8px 4px;">' + badge + '</td>'
              + '<td style="padding:8px 4px;color:#999;">' + date + '</td>'
              + '</tr>';
          }).join('')
          + '</table>';
      } catch { el.textContent = '请求失败'; }
    }
  </script>

  <!-- ── Coupon Management ────────────────────────────── -->
  <section style="margin-top:56px;max-width:480px;margin-left:auto;margin-right:auto;padding:0 24px 40px;">
    <h2 style="font-size:18px;font-weight:600;margin-bottom:20px">折扣券管理</h2>

    <!-- Coupon section password -->
    <div style="margin-bottom:20px">
      <label style="display:block;font-size:12px;color:#666;margin-bottom:4px">管理员密码</label>
      <input id="c-pw" type="password" placeholder="输入管理员密码" style="width:100%;padding:10px 12px;border:1px solid #d0d0d0;font-size:14px;outline:none;">
    </div>

    <!-- Create coupon -->
    <div style="border:1px solid #e5e5e5;padding:24px;margin-bottom:32px">
      <h3 style="font-size:14px;font-weight:600;margin-bottom:16px;text-transform:uppercase;letter-spacing:.05em">创建折扣码</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div>
          <label style="display:block;font-size:12px;color:#666;margin-bottom:4px">折扣码</label>
          <input id="c-code" type="text" placeholder="SAVE10" style="width:100%;padding:9px 12px;border:1px solid #d0d0d0;font-size:14px">
        </div>
        <div>
          <label style="display:block;font-size:12px;color:#666;margin-bottom:4px">类型</label>
          <select id="c-type" style="width:100%;padding:9px 12px;border:1px solid #d0d0d0;font-size:14px;background:#fff">
            <option value="percent">百分比折扣 (%)</option>
            <option value="amount">固定金额 (USD)</option>
          </select>
        </div>
        <div>
          <label style="display:block;font-size:12px;color:#666;margin-bottom:4px">折扣值</label>
          <input id="c-value" type="number" min="0" step="0.01" placeholder="10" style="width:100%;padding:9px 12px;border:1px solid #d0d0d0;font-size:14px">
        </div>
        <div>
          <label style="display:block;font-size:12px;color:#666;margin-bottom:4px">最大使用次数（留空=无限）</label>
          <input id="c-max" type="number" min="1" placeholder="100" style="width:100%;padding:9px 12px;border:1px solid #d0d0d0;font-size:14px">
        </div>
        <div style="grid-column:1/-1">
          <label style="display:block;font-size:12px;color:#666;margin-bottom:4px">到期日期（可选）</label>
          <input id="c-expires" type="date" style="width:100%;padding:9px 12px;border:1px solid #d0d0d0;font-size:14px">
        </div>
      </div>
      <button onclick="createCoupon()" style="padding:10px 24px;background:#000;color:#fff;border:none;font-size:13px;cursor:pointer">创建</button>
      <span id="c-msg" style="margin-left:12px;font-size:13px"></span>
    </div>

    <!-- List coupons -->
    <div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
        <h3 style="font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">折扣码列表</h3>
        <button onclick="loadCoupons()" style="padding:6px 14px;font-size:12px;background:#fff;border:1px solid #d0d0d0;cursor:pointer">刷新</button>
      </div>
      <div id="coupon-list" style="font-size:13px;color:#666">点击刷新加载列表</div>
    </div>
  </section>

  <script>
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    async function createCoupon() {
      const pw = document.getElementById('c-pw').value;
      const code = document.getElementById('c-code').value.trim();
      const type = document.getElementById('c-type').value;
      const value = document.getElementById('c-value').value;
      const max_uses = document.getElementById('c-max').value;
      const expires_at = document.getElementById('c-expires').value;
      const msgEl = document.getElementById('c-msg');
      msgEl.style.color = '#555';
      msgEl.textContent = '创建中…';
      try {
        const body = { password: pw, code, type, value: Number(value) };
        if (max_uses) body.max_uses = Number(max_uses);
        if (expires_at) body.expires_at = expires_at;
        const r = await fetch('/api/admin/coupon', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const d = await r.json();
        if (d.created) {
          msgEl.style.color = '#1a7f37';
          msgEl.textContent = '✓ 创建成功：' + d.code;
          document.getElementById('c-code').value = '';
          document.getElementById('c-value').value = '';
          document.getElementById('c-max').value = '';
          document.getElementById('c-expires').value = '';
          loadCoupons();
        } else {
          msgEl.style.color = '#c00';
          msgEl.textContent = d.error || '创建失败';
        }
      } catch {
        msgEl.style.color = '#c00';
        msgEl.textContent = '请求失败';
      }
    }

    async function loadCoupons() {
      const pw = document.getElementById('c-pw').value;
      const listEl = document.getElementById('coupon-list');
      listEl.textContent = '加载中…';
      try {
        const r = await fetch('/api/admin/coupon?password=' + encodeURIComponent(pw));
        const d = await r.json();
        if (!d.coupons) { listEl.textContent = d.error || '加载失败'; return; }
        if (d.coupons.length === 0) { listEl.textContent = '暂无折扣码'; return; }
        listEl.innerHTML = d.coupons.map(c => {
          const disc = c.discount.type === 'percent'
            ? escHtml(c.discount.value + '% 折扣')
            : 'USD ' + escHtml(c.discount.value.toFixed(2)) + ' 减免';
          const uses = c.max_uses ? c.used + '/' + c.max_uses : c.used + '/无限';
          const exp = c.expires_at ? new Date(c.expires_at * 1000).toLocaleDateString('zh-CN') : '无到期';
          const status = c.active ? '<span style="color:#1a7f37">有效</span>' : '<span style="color:#c00">已停用</span>';
          const deactivateBtn = c.active
            ? '<button onclick="deactivateCoupon(\'' + escHtml(c.id) + '\')" style="padding:4px 10px;font-size:12px;cursor:pointer;color:#c00;border:1px solid #d0d0d0;background:#fff">停用</button>'
            : '';
          return '<div style="display:flex;align-items:center;gap:16px;padding:10px 0;border-bottom:1px solid #f0f0f0;flex-wrap:wrap">'
            + '<strong style="min-width:80px">' + escHtml(c.code) + '</strong>'
            + '<span>' + disc + '</span>'
            + '<span>用量：' + escHtml(String(uses)) + '</span>'
            + '<span>到期：' + escHtml(exp) + '</span>'
            + status
            + deactivateBtn
            + '</div>';
        }).join('');
      } catch {
        listEl.textContent = '加载失败';
      }
    }

    async function deactivateCoupon(id) {
      if (!confirm('确认停用该折扣码？')) return;
      const pw = document.getElementById('c-pw').value;
      const r = await fetch('/api/admin/coupon', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, promotion_code_id: id }),
      });
      const d = await r.json();
      if (d.deactivated) { loadCoupons(); }
      else { alert(d.error || '停用失败'); }
    }
  </script>

  <!-- ── Refund Management ────────────────────────────── -->
  <section style="margin-top:56px;max-width:480px;margin-left:auto;margin-right:auto;padding:0 24px 40px;">
    <h2 style="font-size:18px;font-weight:600;margin-bottom:20px">退款管理</h2>

    <div style="margin-bottom:20px">
      <label style="display:block;font-size:12px;color:#666;margin-bottom:4px">管理员密码</label>
      <input id="r-pw" type="password" placeholder="输入管理员密码" style="width:100%;padding:10px 12px;border:1px solid #d0d0d0;font-size:14px;outline:none;">
    </div>

    <div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <label style="display:block;font-size:12px;color:#666;margin-bottom:4px">客户邮箱</label>
        <input id="r-email" type="email" placeholder="customer@example.com" style="width:100%;padding:9px 12px;border:1px solid #d0d0d0;font-size:14px">
      </div>
      <button onclick="loadRefundOrders()" style="padding:9px 18px;background:#111;color:#fff;border:none;font-size:12px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;width:auto;margin-top:0">查询订单</button>
    </div>

    <div id="refund-orders" style="font-size:13px;color:#666">输入客户邮箱后点查询订单</div>
  </section>

  <script>
    let refundOrdersCache = [];

    async function loadRefundOrders() {
      const pw = document.getElementById('r-pw').value;
      const email = document.getElementById('r-email').value.trim();
      const el = document.getElementById('refund-orders');
      if (!pw || !email) { el.textContent = '请填写管理员密码和客户邮箱'; return; }
      el.textContent = '加载中…';
      try {
        const r = await fetch('/api/admin/coupon?resource=orders&password=' + encodeURIComponent(pw) + '&email=' + encodeURIComponent(email));
        const d = await r.json();
        if (!d.orders) { el.textContent = d.error || '加载失败'; return; }
        if (d.orders.length === 0) { el.textContent = '该邮箱没有找到订单'; return; }
        refundOrdersCache = d.orders;
        renderRefundOrders();
      } catch {
        el.textContent = '请求失败';
      }
    }

    function renderRefundOrders() {
      const el = document.getElementById('refund-orders');
      el.innerHTML = refundOrdersCache.map((o, i) => {
        const date = new Date(o.date).toLocaleDateString('zh-CN');
        const amount = (o.amount / 100).toFixed(2) + ' ' + o.currency.toUpperCase();
        let statusLabel, actionHtml;
        if (o.refund_status === 'full') {
          statusLabel = '<span style="color:#c00">已全额退款</span>';
          actionHtml = '';
        } else {
          statusLabel = o.refund_status === 'partial'
            ? '<span style="color:#b8860b">部分退款 ' + escHtml((o.amount_refunded / 100).toFixed(2)) + ' ' + escHtml(o.currency.toUpperCase()) + '</span>'
            : '<span style="color:#888">未退款</span>';
          actionHtml =
            '<label style="font-size:12px;margin-right:8px"><input type="radio" name="r-type-' + i + '" value="full" checked onchange="toggleRefundAmount(' + i + ')"> 全额</label>'
            + '<label style="font-size:12px;margin-right:8px"><input type="radio" name="r-type-' + i + '" value="partial" onchange="toggleRefundAmount(' + i + ')"> 部分</label>'
            + '<input id="r-amount-' + i + '" type="number" min="0" step="0.01" placeholder="金额" disabled style="width:80px;padding:4px 6px;font-size:12px;border:1px solid #d0d0d0;margin-right:8px">'
            + '<button onclick="submitRefund(' + i + ')" style="padding:4px 10px;font-size:12px;cursor:pointer;color:#c00;border:1px solid #d0d0d0;background:#fff;width:auto;margin-top:0">退款</button>';
        }
        return '<div id="refund-row-' + i + '" style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0;flex-wrap:wrap">'
          + '<span>' + escHtml(date) + '</span>'
          + '<strong>' + escHtml(amount) + '</strong>'
          + statusLabel
          + actionHtml
          + '</div>';
      }).join('');
    }

    function toggleRefundAmount(i) {
      const type = document.querySelector('input[name="r-type-' + i + '"]:checked').value;
      document.getElementById('r-amount-' + i).disabled = type !== 'partial';
    }

    async function submitRefund(i) {
      const order = refundOrdersCache[i];
      const type = document.querySelector('input[name="r-type-' + i + '"]:checked').value;
      const amountInput = document.getElementById('r-amount-' + i).value;
      if (type === 'partial' && !amountInput) { alert('请输入部分退款金额'); return; }
      if (!confirm('确认给这笔订单' + (type === 'full' ? '全额' : '部分') + '退款？此操作不可撤销。')) return;

      const pw = document.getElementById('r-pw').value;
      const body = { password: pw, session_id: order.session_id };
      if (type === 'partial') body.amount = Number(amountInput);

      const r = await fetch('/api/admin/coupon?resource=refund', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const d = await r.json();
      if (!d.refunded) { alert(d.error || '退款失败'); return; }

      order.amount_refunded = (order.amount_refunded || 0) + d.amount;
      order.refund_status = order.amount_refunded >= order.amount ? 'full' : 'partial';
      renderRefundOrders();
    }
  </script>
</body>
</html>
