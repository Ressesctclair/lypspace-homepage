<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — LYP SPACE</title>
  <script src="/js/i18n.js" defer></script>
  <script src="https://www.paypal.com/sdk/js?client-id=AUmkFmI5PLrqaiashs6HaXJIj8aKsWWIcA18GvKpBXTmngf7-zs-qI8pbbb9IxuZgMwAqXuVhATx8O7-&currency=USD" data-namespace="paypal_sdk"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #000; }
    header { padding: 20px 40px; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; }
    .logo { font-weight: 700; font-size: 18px; text-decoration: none; color: #000; }
    .wrap { max-width: 480px; margin: 56px auto; padding: 0 24px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 28px; }
    .product-box { border: 1px solid #e5e5e5; padding: 16px 18px; margin-bottom: 28px; font-size: 15px; font-weight: 600; }
    .group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    input[type="email"],
    input[type="text"] { width: 100%; padding: 11px 14px; border: 1px solid #d0d0d0; font-size: 14px; outline: none; }
    input:focus { border-color: #000; }
    .coupon-row { display: flex; gap: 8px; }
    .coupon-row input { flex: 1; }
    .btn-apply { padding: 11px 16px; background: #fff; border: 1px solid #d0d0d0; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .btn-apply:hover { background: #f5f5f5; }
    .discount-msg { font-size: 13px; margin-top: 7px; min-height: 18px; }
    .ok { color: #1a7f37; }
    .err { color: #c00; }
    .btn-checkout { width: 100%; padding: 14px; background: #000; color: #fff; border: none; font-size: 14px; cursor: pointer; margin-top: 4px; letter-spacing: 0.02em; }
    .btn-checkout:hover { background: #222; }
    .btn-checkout:disabled { background: #aaa; cursor: not-allowed; }
    @media (max-width: 520px) { header { padding: 14px 16px; } .wrap { margin: 32px auto; } }
  </style>
</head>
<body>
  <script src="/js/cart.js"></script>
  <header>
    <a href="/" class="logo">LYP SPACE</a>
  </header>
  <div class="wrap">
    <h1 data-i18n="co_title">Checkout</h1>
    <div class="product-box" id="product-name">Loading…</div>

    <div class="group">
      <label for="email" data-i18n="co_email">Email</label>
      <input id="email" type="email" placeholder="your@email.com">
    </div>

    <div class="group">
      <label for="ship-name">Full name</label>
      <input id="ship-name" type="text" placeholder="Jane Doe">
    </div>

    <div class="group">
      <label for="ship-street">Street address</label>
      <input id="ship-street" type="text" placeholder="123 Main St">
    </div>

    <div class="group">
      <label for="ship-city">City</label>
      <input id="ship-city" type="text" placeholder="Springfield">
    </div>

    <div class="group">
      <label for="ship-state">State / Province</label>
      <input id="ship-state" type="text" placeholder="IL">
    </div>

    <div class="group">
      <label for="ship-postal">Postal code</label>
      <input id="ship-postal" type="text" placeholder="62701">
    </div>

    <div class="group">
      <label for="ship-country">Country</label>
      <select id="ship-country"></select>
    </div>

    <div class="group">
      <label for="ship-phone">Phone</label>
      <input id="ship-phone" type="text" placeholder="+1 555 123 4567">
    </div>

    <div class="group">
      <label data-i18n="co_coupon">Discount code (optional)</label>
      <div class="coupon-row">
        <input id="coupon" type="text" data-i18n-ph="co_coupon_ph" placeholder="Enter code">
        <button class="btn-apply" onclick="applyCode()" data-i18n="co_apply">Apply</button>
      </div>
      <div class="discount-msg" id="discount-msg"></div>
    </div>

    <button class="btn-checkout" id="checkout-btn" onclick="startCheckout()" data-i18n="co_pay">Proceed to Payment</button>

    <div style="display:flex;align-items:center;gap:12px;margin:20px 0;">
      <div style="flex:1;border-top:1px solid #e0e0e0;"></div>
      <span style="font-size:12px;color:#999;letter-spacing:0.06em;">OR</span>
      <div style="flex:1;border-top:1px solid #e0e0e0;"></div>
    </div>

    <div id="paypal-btn-container"></div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const isCart = params.get('cart') === '1';
    const priceId = params.get('price_id');
    const productName = params.get('name') || 'Product';
    const amount = parseFloat(params.get('amount') || '0');
    const qty = parseInt(params.get('qty') || '1', 10);
    const isDynamic = !priceId && amount > 0;
    const nameEl = document.getElementById('product-name');
    const btn = document.getElementById('checkout-btn');

    const COUNTRIES = [
      'Afghanistan','Albania','Algeria','Andorra','Angola','Antigua and Barbuda','Argentina','Armenia',
      'Australia','Austria','Azerbaijan','Bahamas','Bahrain','Bangladesh','Barbados','Belarus','Belgium',
      'Belize','Benin','Bhutan','Bolivia','Bosnia and Herzegovina','Botswana','Brazil','Brunei','Bulgaria',
      'Burkina Faso','Burundi','Cabo Verde','Cambodia','Cameroon','Canada','Central African Republic','Chad',
      'Chile','China','Colombia','Comoros','Congo (Congo-Brazzaville)','Costa Rica','Croatia','Cuba','Cyprus',
      'Czechia','Democratic Republic of the Congo','Denmark','Djibouti','Dominica','Dominican Republic',
      'Ecuador','Egypt','El Salvador','Equatorial Guinea','Eritrea','Estonia','Eswatini','Ethiopia','Fiji',
      'Finland','France','Gabon','Gambia','Georgia','Germany','Ghana','Greece','Grenada','Guatemala','Guinea',
      'Guinea-Bissau','Guyana','Haiti','Honduras','Hong Kong','Hungary','Iceland','India','Indonesia','Iran',
      'Iraq','Ireland','Israel','Italy','Jamaica','Japan','Jordan','Kazakhstan','Kenya','Kiribati','Kuwait',
      'Kyrgyzstan','Laos','Latvia','Lebanon','Lesotho','Liberia','Libya','Liechtenstein','Lithuania',
      'Luxembourg','Macau','Madagascar','Malawi','Malaysia','Maldives','Mali','Malta','Marshall Islands',
      'Mauritania','Mauritius','Mexico','Micronesia','Moldova','Monaco','Mongolia','Montenegro','Morocco',
      'Mozambique','Myanmar','Namibia','Nauru','Nepal','Netherlands','New Zealand','Nicaragua','Niger',
      'Nigeria','North Korea','North Macedonia','Norway','Oman','Pakistan','Palau','Palestine','Panama',
      'Papua New Guinea','Paraguay','Peru','Philippines','Poland','Portugal','Qatar','Romania','Russia',
      'Rwanda','Saint Kitts and Nevis','Saint Lucia','Saint Vincent and the Grenadines','Samoa','San Marino',
      'Sao Tome and Principe','Saudi Arabia','Senegal','Serbia','Seychelles','Sierra Leone','Singapore',
      'Slovakia','Slovenia','Solomon Islands','Somalia','South Africa','South Korea','South Sudan','Spain',
      'Sri Lanka','Sudan','Suriname','Sweden','Switzerland','Syria','Taiwan','Tajikistan','Tanzania',
      'Thailand','Timor-Leste','Togo','Tonga','Trinidad and Tobago','Tunisia','Turkey','Turkmenistan',
      'Tuvalu','Uganda','Ukraine','United Arab Emirates','United Kingdom','United States','Uruguay',
      'Uzbekistan','Vanuatu','Vatican City','Venezuela','Vietnam','Yemen','Zambia','Zimbabwe',
    ];
    const countrySelect = document.getElementById('ship-country');
    countrySelect.innerHTML = '<option value="">Select country</option>' +
      COUNTRIES.map(c => '<option value="' + c + '">' + c + '</option>').join('');

    function tr(k) { return window.i18n ? window.i18n.t(k) : k; }
    function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    if (isCart) {
      const cartItems = Cart.getItems();
      if (!cartItems.length) {
        location.href = '/';
      } else {
        nameEl.style.cssText = 'border:1px solid #e5e5e5;padding:16px 18px;margin-bottom:28px;font-size:14px;';
        nameEl.innerHTML = cartItems.map(i =>
          '<div style="display:flex;justify-content:space-between;padding:4px 0;">' +
          '<span>' + esc(i.name) + (i.qty > 1 ? ' × ' + i.qty : '') + '</span>' +
          '<span style="color:#555;">$' + (i.price * i.qty).toFixed(2) + '</span>' +
          '</div>'
        ).join('') +
        '<div style="display:flex;justify-content:space-between;border-top:1px solid #e5e5e5;margin-top:10px;padding-top:10px;font-weight:600;">' +
          '<span>Total</span><span>$' + Cart.total().toFixed(2) + ' USD</span></div>';
      }
    } else if (!priceId && !isDynamic) {
      nameEl.textContent = tr('co_no_product');
      nameEl.style.color = '#c00';
      btn.disabled = true;
    } else {
      const priceLabel = amount > 0 ? ' — $' + (amount * qty).toFixed(2) : '';
      nameEl.textContent = decodeURIComponent(productName) + (qty > 1 ? ' × ' + qty : '') + priceLabel;
    }

    let promoCodeId = null;
    let appliedCouponCode = null;
    let appliedCouponDiscount = null; // { type: 'percent'|'amount', value, currency? }
    let activeDiscount = null; // null | 'coupon' | 'member'

    async function checkMembership() {
      if (activeDiscount === 'coupon') return;
      const email = document.getElementById('email').value.trim();
      const msgEl = document.getElementById('discount-msg');
      if (!email) return;
      try {
        const r = await fetch('/api/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'check-member', email }),
        });
        const d = await r.json();
        if (d.is_member) {
          activeDiscount = 'member';
          msgEl.textContent = '✓ Member discount applied — 5% off';
          msgEl.className = 'discount-msg ok';
        } else if (activeDiscount === 'member') {
          activeDiscount = null;
          msgEl.textContent = '';
          msgEl.className = 'discount-msg';
        }
      } catch {
        // membership hint is a nice-to-have — a failed check should not block checkout
      }
    }
    document.getElementById('email').addEventListener('blur', checkMembership);

    async function applyCode() {
      const msgEl = document.getElementById('discount-msg');
      const code = document.getElementById('coupon').value.trim();
      const email = document.getElementById('email').value.trim();
      msgEl.className = 'discount-msg';
      msgEl.textContent = '';
      if (!code) return;
      if (!email) {
        msgEl.textContent = tr('co_email_first');
        msgEl.className = 'discount-msg err';
        return;
      }
      msgEl.textContent = tr('co_verifying');
      try {
        const r = await fetch('/api/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'validate', code, email }),
        });
        const d = await r.json();
        if (d.valid) {
          promoCodeId = d.promotion_code_id;
          appliedCouponCode = code.toUpperCase();
          appliedCouponDiscount = d.discount;
          activeDiscount = 'coupon';
          msgEl.textContent = '✓ ' + d.message;
          msgEl.className = 'discount-msg ok';
        } else {
          promoCodeId = null;
          appliedCouponCode = null;
          appliedCouponDiscount = null;
          if (activeDiscount === 'coupon') activeDiscount = null;
          msgEl.textContent = d.error || 'Invalid discount code';
          msgEl.className = 'discount-msg err';
        }
      } catch {
        msgEl.textContent = tr('co_verify_fail');
        msgEl.className = 'discount-msg err';
      }
    }

    async function startCheckout() {
      const email = document.getElementById('email').value.trim();
      const shipName = document.getElementById('ship-name').value.trim();
      const shipStreet = document.getElementById('ship-street').value.trim();
      const shipCity = document.getElementById('ship-city').value.trim();
      const shipState = document.getElementById('ship-state').value.trim();
      const shipPostal = document.getElementById('ship-postal').value.trim();
      const shipCountry = document.getElementById('ship-country').value;
      const shipPhone = document.getElementById('ship-phone').value.trim();
      if (!email) { alert(tr('co_email_req')); return; }
      if (!shipName || !shipStreet || !shipCity || !shipState || !shipPostal || !shipCountry || !shipPhone) {
        alert('Please fill in your shipping address.');
        return;
      }
      if (!isCart && !priceId && !isDynamic) return;
      btn.disabled = true;
      btn.textContent = tr('co_redirecting');
      try {
        const body = {
          email,
          shipping_name: shipName, shipping_street: shipStreet, shipping_city: shipCity,
          shipping_state: shipState, shipping_postal_code: shipPostal, shipping_country: shipCountry, shipping_phone: shipPhone,
        };
        if (isCart) {
          body.items = Cart.getItems().map(i =>
            i.price_id
              ? { price_id: i.price_id, quantity: i.qty }
              : { price_data: { name: i.name, amount: i.price }, quantity: i.qty }
          );
        } else if (isDynamic) {
          body.product_name = decodeURIComponent(productName);
          body.amount = amount;
          body.quantity = qty;
        } else {
          body.price_id = priceId;
          body.quantity = qty;
        }
        if (promoCodeId) { body.promotion_code_id = promoCodeId; body.coupon_code = appliedCouponCode; }
        const r = await fetch('/api/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const d = await r.json();
        if (d.url) {
          if (isCart) Cart.clear();
          location.href = d.url;
        } else {
          btn.disabled = false;
          btn.textContent = tr('co_pay');
          alert(d.error || tr('co_fail'));
        }
      } catch {
        btn.disabled = false;
        btn.textContent = tr('co_pay');
        alert(tr('co_fail'));
      }
    }
  </script>

  <script>
    // PayPal
    (function initPayPal() {
      if (typeof paypal_sdk === 'undefined') return;

      function getPayPalAmount() {
        const base = isCart ? Cart.total() : parseFloat(params.get('amount') || '0') * qty;
        let discounted = base;
        if (activeDiscount === 'coupon' && appliedCouponDiscount) {
          discounted = appliedCouponDiscount.type === 'percent'
            ? base * (1 - appliedCouponDiscount.value / 100)
            : base - appliedCouponDiscount.value;
        } else if (activeDiscount === 'member') {
          discounted = base * 0.95;
        }
        return Math.max(0, discounted).toFixed(2);
      }

      paypal_sdk.Buttons({
        style: { layout: 'horizontal', color: 'gold', shape: 'rect', label: 'paypal', height: 45 },
        createOrder: function(data, actions) {
          const email = document.getElementById('email').value.trim();
          if (!email) { alert(tr('co_email_req')); return Promise.reject(); }
          const shipName = document.getElementById('ship-name').value.trim();
          const shipStreet = document.getElementById('ship-street').value.trim();
          const shipCity = document.getElementById('ship-city').value.trim();
          const shipState = document.getElementById('ship-state').value.trim();
          const shipPostal = document.getElementById('ship-postal').value.trim();
          const shipCountry = document.getElementById('ship-country').value;
          const shipPhone = document.getElementById('ship-phone').value.trim();
          if (!shipName || !shipStreet || !shipCity || !shipState || !shipPostal || !shipCountry || !shipPhone) {
            alert('Please fill in your shipping address.');
            return Promise.reject();
          }
          const amount = getPayPalAmount();
          if (parseFloat(amount) <= 0) return Promise.reject();
          return actions.order.create({
            purchase_units: [{ amount: { value: amount, currency_code: 'USD' } }],
            application_context: { shipping_preference: 'NO_SHIPPING' },
          });
        },
        onApprove: function(data, actions) {
          return actions.order.capture().then(function(details) {
            if (isCart) Cart.clear();
            const email = document.getElementById('email').value.trim();
            const capture = details.purchase_units?.[0]?.payments?.captures?.[0];
            const capturedAmount = capture ? capture.amount.value : getPayPalAmount();
            fetch('/api/checkout', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              keepalive: true,
              body: JSON.stringify({
                action: 'record-paypal-order',
                email,
                paypal_order_id: details.id,
                amount: capturedAmount,
                shipping_name: document.getElementById('ship-name').value.trim(),
                shipping_street: document.getElementById('ship-street').value.trim(),
                shipping_city: document.getElementById('ship-city').value.trim(),
                shipping_state: document.getElementById('ship-state').value.trim(),
                shipping_postal_code: document.getElementById('ship-postal').value.trim(),
                shipping_country: document.getElementById('ship-country').value,
                shipping_phone: document.getElementById('ship-phone').value.trim(),
              }),
            }).catch(function(err) { console.error('Failed to record PayPal order', err); });
            const name = details.payer.name.given_name || '';
            alert('Payment successful! Thank you' + (name ? ', ' + name : '') + '.');
            location.href = '/?paypal=success';
          });
        },
        onError: function(err) {
          console.error('PayPal error', err);
          alert('PayPal payment failed, please try again.');
        },
      }).render('#paypal-btn-container');
    })();
  </script>
</body>
</html>
