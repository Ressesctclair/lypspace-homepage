<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — LYP SPACE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #000; }
    header { padding: 20px 40px; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; }
    .logo { font-weight: 700; font-size: 18px; text-decoration: none; color: #000; }
    .wrap { max-width: 480px; margin: 56px auto; padding: 0 24px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 28px; }
    .product-box { border: 1px solid #e5e5e5; padding: 16px 18px; margin-bottom: 28px; font-size: 15px; font-weight: 600; }
    .group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    input[type="email"],
    input[type="text"] { width: 100%; padding: 11px 14px; border: 1px solid #d0d0d0; font-size: 14px; outline: none; }
    input:focus { border-color: #000; }
    .coupon-row { display: flex; gap: 8px; }
    .coupon-row input { flex: 1; }
    .btn-apply { padding: 11px 16px; background: #fff; border: 1px solid #d0d0d0; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .btn-apply:hover { background: #f5f5f5; }
    .discount-msg { font-size: 13px; margin-top: 7px; min-height: 18px; }
    .ok { color: #1a7f37; }
    .err { color: #c00; }
    .btn-checkout { width: 100%; padding: 14px; background: #000; color: #fff; border: none; font-size: 14px; cursor: pointer; margin-top: 4px; letter-spacing: 0.02em; }
    .btn-checkout:hover { background: #222; }
    .btn-checkout:disabled { background: #aaa; cursor: not-allowed; }
    @media (max-width: 520px) { header { padding: 14px 16px; } .wrap { margin: 32px auto; } }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">LYP SPACE</a>
  </header>
  <div class="wrap">
    <h1>Checkout</h1>
    <div class="product-box" id="product-name">Loading…</div>

    <div class="group">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="your@email.com">
    </div>

    <div class="group">
      <label>Discount code (optional)</label>
      <div class="coupon-row">
        <input id="coupon" type="text" placeholder="Enter code">
        <button class="btn-apply" onclick="applyCode()">Apply</button>
      </div>
      <div class="discount-msg" id="discount-msg"></div>
    </div>

    <button class="btn-checkout" id="checkout-btn" onclick="startCheckout()">Proceed to Payment</button>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const priceId = params.get('price_id');
    const productName = params.get('name') || 'Product';
    const qty = parseInt(params.get('qty') || '1', 10);
    const nameEl = document.getElementById('product-name');
    const btn = document.getElementById('checkout-btn');

    if (!priceId) {
      nameEl.textContent = 'Product not found. Please go back and try again.';
      nameEl.style.color = '#c00';
      btn.disabled = true;
    } else {
      nameEl.textContent = productName + (qty > 1 ? ' × ' + qty : '');
    }

    let promoCodeId = null;
    let appliedCouponCode = null;

    async function applyCode() {
      const msgEl = document.getElementById('discount-msg');
      const code = document.getElementById('coupon').value.trim();
      const email = document.getElementById('email').value.trim();
      msgEl.className = 'discount-msg';
      msgEl.textContent = '';
      if (!code) return;
      if (!email) {
        msgEl.textContent = 'Please enter your email first';
        msgEl.className = 'discount-msg err';
        return;
      }
      msgEl.textContent = 'Verifying…';
      try {
        const r = await fetch('/api/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'validate', code, email }),
        });
        const d = await r.json();
        if (d.valid) {
          promoCodeId = d.promotion_code_id;
          appliedCouponCode = code.toUpperCase();
          msgEl.textContent = '✓ ' + d.message;
          msgEl.className = 'discount-msg ok';
        } else {
          promoCodeId = null;
          appliedCouponCode = null;
          msgEl.textContent = d.error || 'Invalid discount code';
          msgEl.className = 'discount-msg err';
        }
      } catch {
        msgEl.textContent = 'Failed to verify. Please try again.';
        msgEl.className = 'discount-msg err';
      }
    }

    async function startCheckout() {
      const email = document.getElementById('email').value.trim();
      if (!email) { alert('Please enter your email'); return; }
      if (!priceId) return;
      btn.disabled = true;
      btn.textContent = 'Redirecting…';
      try {
        const body = { price_id: priceId, email, quantity: qty };
        if (promoCodeId) { body.promotion_code_id = promoCodeId; body.coupon_code = appliedCouponCode; }
        const r = await fetch('/api/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const d = await r.json();
        if (d.url) {
          location.href = d.url;
        } else {
          btn.disabled = false;
          btn.textContent = 'Proceed to Payment';
          alert(d.error || 'Checkout failed. Please try again.');
        }
      } catch {
        btn.disabled = false;
        btn.textContent = 'Proceed to Payment';
        alert('Checkout failed. Please try again.');
      }
    }
  </script>
</body>
</html>
