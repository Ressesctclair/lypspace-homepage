<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — LYP SPACE</title>
  <script src="/js/i18n.js" defer></script>
  <script src="/js/cart.js" defer></script>
  <script src="/js/pannable.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #111111; --white: #ffffff; --bg: #f5f0e6; --gray: #6b6b6b;
      --light-gray: #ede8da; --border: #ddd8cc;
      --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--black); font-size: 14px; line-height: 1.6; }
    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 60px;
    }
    .logo { font-size: 15px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
    nav { display: flex; gap: 36px; }
    nav a { font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--black); }
    .header-icons { display: flex; align-items: center; gap: 20px; }
    .header-icons a { font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
    .search-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; color: var(--black); }
    .search-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    #search-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,.5); align-items: flex-start; justify-content: center; padding-top: 80px; }
    #search-overlay.open { display: flex; }
    #search-box { background: var(--white); width: 100%; max-width: 560px; margin: 0 20px; border-radius: 2px; display: flex; align-items: center; padding: 0 16px; height: 52px; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
    #search-box svg { width: 18px; height: 18px; stroke: var(--gray); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    #search-input { flex: 1; border: none; outline: none; font-size: 15px; font-family: var(--font); padding: 0 12px; background: transparent; color: var(--black); }
    #search-input::placeholder { color: var(--gray); }
    #search-close { background: none; border: none; cursor: pointer; padding: 4px; color: var(--gray); font-size: 20px; line-height: 1; }

    .breadcrumb {
      padding: 16px 40px; font-size: 12px; color: var(--gray);
      border-bottom: 1px solid var(--border);
    }
    .breadcrumb a { color: var(--gray); }
    .breadcrumb a:hover { color: var(--black); text-decoration: underline; }
    .breadcrumb span { margin: 0 8px; }

    .product-layout {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 60px; max-width: 1200px; margin: 0 auto; padding: 48px 40px;
    }

    /* Image gallery */
    .image-gallery {}
    .main-image {
      width: 100%; aspect-ratio: 3/4; background: var(--light-gray);
      overflow: hidden; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: center;
      position: relative; cursor: grab;
    }
    .img-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.85); border: none; cursor: pointer;
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; z-index: 2; padding: 0; line-height: 1;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .img-arrow.prev { left: 10px; }
    .img-arrow.next { right: 10px; }
    .img-arrow:hover { background: #fff; }
    .main-image img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 50%; display: block; transition: opacity 0.22s ease; transform-origin: center center; cursor: grab; user-select: none; -webkit-user-drag: none; }
    .main-image img.zoomed { cursor: grab; }
    .thumb-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .thumb {
      width: 72px; height: 72px; background: var(--light-gray);
      overflow: hidden; cursor: pointer; border: 2px solid transparent; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb.active { border-color: var(--black); }
    .thumb img { width: 100%; height: 100%; object-fit: contain; display: block; }

    /* Product info */
    .product-info { padding-top: 8px; }
    .product-type-label {
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--gray); margin-bottom: 12px;
    }
    .product-name { font-size: 24px; font-weight: 400; letter-spacing: 0.02em; margin-bottom: 16px; line-height: 1.3; }
    .product-price { font-size: 18px; margin-bottom: 32px; }
    .price-original { color: var(--gray); text-decoration: line-through; font-weight: 400; font-size: 14px; }
    .price-discount-pct { color: #c00; font-weight: 600; font-size: 14px; }
    .price-sale { font-weight: 600; }
    .divider { border: none; border-top: 1px solid var(--border); margin-bottom: 24px; }
    .product-description { font-size: 13px; color: var(--gray); line-height: 1.8; margin-bottom: 24px; }

    /* Variant selector */
    .variant-group { margin-bottom: 24px; }
    .variant-label { font-size: 12px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
    .variant-options { display: flex; flex-wrap: wrap; gap: 8px; }
    .var-btn {
      padding: 8px 16px; border: 1px solid var(--border);
      background: var(--bg); font-size: 13px; cursor: pointer;
      font-family: var(--font); color: var(--black); transition: all 0.15s;
    }
    .var-btn:hover { border-color: var(--black); }
    .var-btn.active { background: var(--black); border-color: var(--black); color: var(--white); }
    .var-btn.out { opacity: 0.4; cursor: not-allowed; text-decoration: line-through; }

    /* Qty */
    .qty-group { margin-bottom: 24px; }
    .qty-label { font-size: 12px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
    .qty-control { display: flex; align-items: center; border: 1px solid var(--border); width: fit-content; }
    .qty-btn { width: 40px; height: 40px; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--black); }
    .qty-num { width: 40px; text-align: center; font-size: 14px; }

    .buy-btn {
      display: block; width: 100%; padding: 16px;
      background: var(--black); color: var(--white);
      font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
      border: none; cursor: pointer; font-family: var(--font);
      transition: background 0.2s; text-align: center; margin-bottom: 12px;
    }
    .buy-btn:hover { background: #333; }
    .buy-btn.outline { background: var(--bg); color: var(--black); border: 1px solid var(--black); }
    .buy-btn.outline:hover { background: var(--light-gray); }

    .error-msg { font-size: 12px; color: #c00; margin-top: 6px; display: none; }

    .not-found { max-width: 600px; margin: 80px auto; padding: 0 40px; text-align: center; color: var(--gray); }

    footer {
      margin-top: 80px; border-top: 1px solid var(--border);
      padding: 40px; text-align: center;
      font-size: 12px; color: var(--gray); letter-spacing: 0.06em;
    }

    @media (max-width: 900px) {
      .product-layout { grid-template-columns: 1fr; gap: 32px; padding: 24px 20px; }
      header { padding: 0 20px; }
      nav { display: none; }
      .breadcrumb { padding: 12px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="logo">LYP SPACE</a>
    <nav>
      <a href="/">Home</a>
      <a href="/catalog">Catalog</a>
      <a href="/contact">Contact</a>
    </nav>
    <div class="header-icons">
      <button class="search-btn" onclick="openSearch()" aria-label="Search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <a href="/login">Sign in</a>
    </div>
  </header>

  <div id="search-overlay" onclick="closeSearch(event)">
    <div id="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="text" placeholder="Search products…" autocomplete="off" onkeydown="handleSearchKey(event)">
      <button id="search-close" onclick="closeSearch()" aria-label="Close">&#x2715;</button>
    </div>
  </div>

  <div class="breadcrumb" id="breadcrumb">
    <a href="/">Home</a><span>/</span>
    <a href="/catalog">Catalog</a><span>/</span>
    <span id="bc-name">…</span>
  </div>

  <div id="product-root"></div>

  <footer>&copy; 2026 LYP SPACE</footer>

  <script>
    let product = null;
    let selectedVariant = null;
    let qty = 1;
    let soldOut = false;

    const handle = new URLSearchParams(location.search).get('h');

    async function init() {
      if (!handle) { showNotFound(); return; }
      const [prodRes, invRes, customRes] = await Promise.all([
        fetch('/products.json'),
        fetch('/api/checkout?action=inventory').catch(() => null),
        fetch('/api/checkout?action=products' + (localStorage.getItem('lypspace_admin_pw') ? '&pw=' + encodeURIComponent(localStorage.getItem('lypspace_admin_pw')) : '')).catch(() => null)
      ]);
      const products = await prodRes.json();
      let customProducts = [];
      if (customRes && customRes.ok) {
        const cd = await customRes.json();
        customProducts = (cd.products || []).map(p => ({ ...p, images: p.images || [], variants: p.variants || [] }));
      }
      product = customProducts.find(p => p.handle === handle) || products.find(p => p.handle === handle);
      if (!product) { showNotFound(); return; }

      let invMap = {};
      if (invRes && invRes.ok) {
        const inv = await invRes.json();
        invMap = inv.inventory || {};
      }
      const override = invMap[handle] || {};
      soldOut = 'in_stock' in override ? !override.in_stock : (product.total_qty <= 0);
      if (override.price != null) product.price = override.price;
      product.sale_price = override.sale_price != null ? override.sale_price : (product.sale_price ?? null);
      if (override.description) product.description = override.description;
      if (override.variant_qtys) {
        product.variants = product.variants.map(v => ({
          ...v,
          qty: override.variant_qtys[v.option1_value] ?? v.qty
        }));
      }

      document.title = product.title + ' — LYP SPACE';
      document.getElementById('bc-name').textContent = product.title;
      renderProduct();
      attachWheelScroll();
    }

    function isOnSale() {
      return product.price > 0 && product.sale_price != null && product.sale_price > 0 && product.sale_price < product.price;
    }

    function discountPct() {
      return Math.round((1 - product.sale_price / product.price) * 100);
    }

    function currentPrice() {
      const base = selectedVariant ? selectedVariant.price : product.price;
      if (isOnSale()) return +(base * (product.sale_price / product.price)).toFixed(2);
      return base;
    }

    function priceDisplayHtml(base) {
      if (base <= 0) return 'Contact for price';
      if (!isOnSale()) return '$' + base.toFixed(2) + ' USD';
      const salePrice = +(base * (product.sale_price / product.price)).toFixed(2);
      return `<s class="price-original">$${base.toFixed(2)}</s> <span class="price-discount-pct">${discountPct()}% OFF</span> <span class="price-sale">$${salePrice.toFixed(2)} USD</span>`;
    }

    let currentImgIndex = 0;

    function normOptName(name) {
      if (!name) return 'SIZE';
      if (/^[A-Z0-9]+(?:\/[A-Z0-9]+){1,}$/i.test(name.trim())) return 'SIZE';
      if (/^siz/i.test(name.trim())) return 'SIZE';
      return name;
    }

    function renderProduct() {
      const hasVariants = product.variants && product.variants.length > 0;
      const hasImages = product.images && product.images.length > 0;
      const price = priceDisplayHtml(product.price);

      // Build option groups — normalise fragmented size names like "S/M/L" → "SIZE"
      const optGroups = {};
      const opt2Groups = {};
      const opt3Groups = {};
      if (hasVariants) {
        product.variants.forEach(v => {
          const key = normOptName(v.option1_name);
          if (!optGroups[key]) optGroups[key] = [];
          if (!optGroups[key].find(x => x.value === v.option1_value)) {
            optGroups[key].push({ value: v.option1_value, qty: v.qty, price: v.price });
          }
          if (v.option2_name && v.option2_value) {
            const key2 = normOptName(v.option2_name);
            if (!opt2Groups[key2]) opt2Groups[key2] = [];
            if (!opt2Groups[key2].find(x => x.value === v.option2_value)) {
              opt2Groups[key2].push({ value: v.option2_value, qty: v.qty, price: v.price });
            }
          }
          if (v.option3_name && v.option3_value) {
            const key3 = normOptName(v.option3_name);
            if (!opt3Groups[key3]) opt3Groups[key3] = [];
            if (!opt3Groups[key3].find(x => x.value === v.option3_value)) {
              opt3Groups[key3].push({ value: v.option3_value, qty: v.qty, price: v.price });
            }
          }
        });
      }

      const thumbsHtml = hasImages && product.images.length > 1
        ? `<div class="thumb-row">${product.images.map((img, i) =>
            `<div class="thumb ${i===0?'active':''}" onclick="switchImage(${i})">
              <img src="${img}" alt="${esc(product.title)} ${i+1}" loading="lazy">
            </div>`
          ).join('')}</div>` : '';

      const renderOptGroup = (name, opts) =>
        `<div class="variant-group">
          <p class="variant-label">${esc(name)}</p>
          <div class="variant-options">
            ${opts.map(o =>
              `<button class="var-btn${o.qty <= 0 ? ' out' : ''}" data-opt="${esc(name)}" data-val="${esc(o.value)}" onclick="selectVariant('${esc(name)}','${esc(o.value)}')">${esc(o.value)}</button>`
            ).join('')}
          </div>
        </div>`;
      const variantsHtml = [
        ...Object.entries(optGroups).map(([n, o]) => renderOptGroup(n, o)),
        ...Object.entries(opt2Groups).map(([n, o]) => renderOptGroup(n, o)),
        ...Object.entries(opt3Groups).map(([n, o]) => renderOptGroup(n, o)),
      ].join('');

      const root = document.getElementById('product-root');
      currentImgIndex = 0;
      root.innerHTML = `
        <div class="product-layout">
          <div class="image-gallery">
            <div class="main-image" id="main-img">
              ${hasImages ? `<img id="main-img-el" src="${product.images[0]}" alt="${esc(product.title)}">` : ''}
              ${product.images && product.images.length > 1 ? `
                <button class="img-arrow prev" onclick="imgNav(-1)">&#8249;</button>
                <button class="img-arrow next" onclick="imgNav(1)">&#8250;</button>
              ` : ''}
            </div>
            ${thumbsHtml}
          </div>
          <div class="product-info">
            <p class="product-type-label">${esc(product.type || 'LYP SPACE')}</p>
            <h1 class="product-name">${esc(product.title)}</h1>
            <p class="product-price" id="price-display">${price}</p>
            <hr class="divider">
            ${product.description ? `<p class="product-description">${esc(product.description)}</p>` : ''}
            ${variantsHtml}
            ${hasVariants ? '<p class="error-msg" id="variant-err">Please select a size / option</p>' : ''}
            <div class="qty-group">
              <p class="qty-label">Quantity</p>
              <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <span class="qty-num" id="qty-display">1</span>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
              </div>
            </div>
            ${soldOut
              ? `<button class="buy-btn" disabled style="background:#aaa;cursor:not-allowed;">Sold Out</button>`
              : `<button class="buy-btn outline" onclick="addToCart()">Add to Cart</button>
                 <button class="buy-btn" onclick="buyNow()">Buy Now</button>`
            }
          </div>
        </div>`;
    }

    let _imgScale = 1, _panX = 0, _panY = 0;
    function applyTransform(imgEl) {
      if (!imgEl) return;
      const zoomed = _imgScale > 1.05;
      if (zoomed && imgEl.parentElement) {
        const W = imgEl.parentElement.offsetWidth;
        const H = imgEl.parentElement.offsetHeight;
        const maxX = W * (_imgScale - 1) / 2;
        const maxY = H * (_imgScale - 1) / 2;
        _panX = Math.max(-maxX, Math.min(maxX, _panX));
        _panY = Math.max(-maxY, Math.min(maxY, _panY));
      }
      imgEl.style.transform = zoomed ? `scale(${_imgScale}) translate(${_panX/_imgScale}px,${_panY/_imgScale}px)` : '';
      imgEl.classList.toggle('zoomed', zoomed);
    }
    function attachWheelScroll() {
      const el = document.getElementById('main-img');
      if (!el || !product.images) return;
      let _swipeLocked = false, _zoomLockTimer = null;
      function lockSwipe(ms) {
        _swipeLocked = true;
        clearTimeout(_zoomLockTimer);
        _zoomLockTimer = setTimeout(() => { _swipeLocked = false; }, ms);
      }
      // Desktop: wheel+ctrlKey = zoom+pan; plain wheel = switch image
      el.addEventListener('wheel', function(e) {
        e.preventDefault();
        const imgEl = document.getElementById('main-img-el');
        if (e.ctrlKey) {
          const factor = e.deltaY > 0 ? 0.9 : 1.1;
          _imgScale = Math.max(1, Math.min(4, _imgScale * factor));
          if (_imgScale <= 1.05) { _imgScale = 1; _panX = 0; _panY = 0; lockSwipe(1500); }
          applyTransform(imgEl);
        } else if (_imgScale > 1.05) {
          // Pan with plain scroll when zoomed
          _panX -= e.deltaX; _panY -= e.deltaY;
          applyTransform(imgEl);
        } else if (product.images.length > 1 && !_swipeLocked) {
          lockSwipe(1500);
          switchImage((currentImgIndex + (e.deltaY > 0 ? 1 : -1) + product.images.length) % product.images.length);
        }
      }, { passive: false });
      // Desktop: mouse drag to pan when zoomed
      let _mouseDown = false, _mouseSX = 0, _mouseSY = 0, _panSX = 0, _panSY = 0;
      el.addEventListener('mousedown', function(e) {
        _mouseDown = true; _mouseSX = e.clientX; _mouseSY = e.clientY; _panSX = _panX; _panSY = _panY; el.style.cursor = 'grabbing'; e.preventDefault();
      });
      window.addEventListener('mousemove', function(e) {
        if (!_mouseDown) return;
        _panX = _panSX + (e.clientX - _mouseSX);
        _panY = _panSY + (e.clientY - _mouseSY);
        applyTransform(document.getElementById('main-img-el'));
      });
      window.addEventListener('mouseup', function() {
        if (!_mouseDown) return;
        _mouseDown = false; el.style.cursor = '';
        if (_imgScale <= 1.05) { _panX = 0; _panY = 0; applyTransform(document.getElementById('main-img-el')); }
      });
      // Touch: pinch zoom + pan when zoomed + swipe when normal
      let _tx = 0, _ty = 0, _pinchActive = false, _pinchStart = 0, _isPanning = false;
      let _panStartX = 0, _panStartY = 0;
      function pinchDist(t) {
        return Math.sqrt(Math.pow(t[0].clientX-t[1].clientX,2)+Math.pow(t[0].clientY-t[1].clientY,2));
      }
      el.addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
          _pinchActive = true; _isPanning = false;
          _pinchStart = pinchDist(e.touches);
          e.preventDefault();
        } else if (e.touches.length === 1) {
          _pinchActive = false;
          _tx = e.touches[0].clientX;
          _ty = e.touches[0].clientY;
          _isPanning = true; _panStartX = _panX; _panStartY = _panY;
        }
      }, { passive: false });
      el.addEventListener('touchmove', function(e) {
        e.preventDefault();
        const imgEl = document.getElementById('main-img-el');
        if (e.touches.length === 2 && _pinchActive && _pinchStart > 0) {
          const s = Math.max(1, Math.min(4, _imgScale * pinchDist(e.touches) / _pinchStart));
          if (imgEl) {
            const W = el.offsetWidth, H = el.offsetHeight;
            const mX = W * (s - 1) / 2, mY = H * (s - 1) / 2;
            const cx = Math.max(-mX, Math.min(mX, _panX));
            const cy = Math.max(-mY, Math.min(mY, _panY));
            imgEl.style.transform = `scale(${s}) translate(${cx/s}px,${cy/s}px)`;
          }
        } else if (e.touches.length === 1 && _isPanning) {
          _panX = _panStartX + (e.touches[0].clientX - _tx);
          _panY = _panStartY + (e.touches[0].clientY - _ty);
          applyTransform(imgEl);
        }
      }, { passive: false });
      el.addEventListener('touchend', function(e) {
        const imgEl = document.getElementById('main-img-el');
        if (_pinchActive && e.touches.length < 2) {
          const m = (imgEl?.style.transform||'').match(/scale\(([^)]+)\)/);
          _imgScale = m ? Math.max(1, parseFloat(m[1])) : 1;
          if (_imgScale < 1.05) { _imgScale = 1; _panX = 0; _panY = 0; applyTransform(imgEl); lockSwipe(1500); }
          if (e.touches.length === 0) _pinchActive = false;
        } else if (!_pinchActive && e.touches.length === 0) {
          const dx = e.changedTouches[0].clientX - _tx;
          const dy = e.changedTouches[0].clientY - _ty;
          if (_imgScale <= 1.05) {
            if (product.images.length > 1 && !_swipeLocked && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
              lockSwipe(1500);
              switchImage((currentImgIndex + (dx < 0 ? 1 : -1) + product.images.length) % product.images.length);
            }
            _panX = 0; _panY = 0; applyTransform(imgEl);
          }
        }
        if (e.touches.length === 0) _isPanning = false;
      }, { passive: true });
    }

    function imgNav(dir) {
      const len = product.images.length;
      switchImage((currentImgIndex + dir + len) % len);
    }
    function switchImage(i) {
      currentImgIndex = i;
      const el = document.getElementById('main-img-el');
      if (!el) return;
      el.style.opacity = '0';
      setTimeout(() => {
        el.src = product.images[i];
        el.style.transform = '';
        _imgScale = 1; _panX = 0; _panY = 0;
        el.style.opacity = '1';
      }, 220);
      document.querySelectorAll('.thumb').forEach((t, idx) => t.classList.toggle('active', idx === i));
    }

    const _selectedOpts = {};
    function selectVariant(optName, val) {
      _selectedOpts[optName] = val;
      document.querySelectorAll(`.var-btn[data-opt="${optName}"]`).forEach(b => {
        b.classList.toggle('active', b.dataset.val === val);
      });
      selectedVariant = product.variants.find(v => {
        const k1 = normOptName(v.option1_name);
        const k2 = v.option2_name ? normOptName(v.option2_name) : null;
        const k3 = v.option3_name ? normOptName(v.option3_name) : null;
        const m1 = !_selectedOpts[k1] || _selectedOpts[k1] === v.option1_value;
        const m2 = !k2 || !_selectedOpts[k2] || _selectedOpts[k2] === v.option2_value;
        const m3 = !k3 || !_selectedOpts[k3] || _selectedOpts[k3] === v.option3_value;
        return m1 && m2 && m3;
      }) || null;
      // Auto-highlight option2/option3 when the other dimensions are picked
      if (selectedVariant) {
        if (selectedVariant.option2_name && selectedVariant.option2_value) {
          const k2 = normOptName(selectedVariant.option2_name);
          if (!_selectedOpts[k2]) {
            _selectedOpts[k2] = selectedVariant.option2_value;
            document.querySelectorAll(`.var-btn[data-opt="${k2}"]`).forEach(b => {
              b.classList.toggle('active', b.dataset.val === selectedVariant.option2_value);
            });
          }
        }
        if (selectedVariant.option3_name && selectedVariant.option3_value) {
          const k3 = normOptName(selectedVariant.option3_name);
          if (!_selectedOpts[k3]) {
            _selectedOpts[k3] = selectedVariant.option3_value;
            document.querySelectorAll(`.var-btn[data-opt="${k3}"]`).forEach(b => {
              b.classList.toggle('active', b.dataset.val === selectedVariant.option3_value);
            });
          }
        }
      }
      const base = selectedVariant ? selectedVariant.price : product.price;
      document.getElementById('price-display').innerHTML = priceDisplayHtml(base);
      const err = document.getElementById('variant-err');
      if (err) err.style.display = 'none';
    }

    function changeQty(d) {
      qty = Math.max(1, qty + d);
      document.getElementById('qty-display').textContent = qty;
    }

    function validateVariant() {
      if (product.variants && product.variants.length > 0 && !selectedVariant) {
        const err = document.getElementById('variant-err');
        if (err) err.style.display = 'block';
        return false;
      }
      return true;
    }

    function getVariantLabel() {
      if (!selectedVariant) return '';
      let label = selectedVariant.option1_value || '';
      if (selectedVariant.option2_value) label += ' / ' + selectedVariant.option2_value;
      if (selectedVariant.option3_value) label += ' / ' + selectedVariant.option3_value;
      return label ? ` (${label})` : '';
    }

    function addToCart() {
      if (!validateVariant()) return;
      const p = currentPrice();
      Cart.add({
        handle: product.handle,
        name: product.title + getVariantLabel(),
        price: p,
        qty,
        price_data: { name: product.title + getVariantLabel(), amount: p }
      });
      showToast('Added to cart');
    }

    function showToast(msg) {
      let t = document.getElementById('cart-toast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'cart-toast';
        t.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:12px 24px;font-size:13px;letter-spacing:0.06em;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;z-index:999;';
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.opacity = '1';
      t.style.transform = 'translateX(-50%) translateY(0)';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => {
        t.style.opacity = '0';
        t.style.transform = 'translateX(-50%) translateY(20px)';
      }, 2000);
    }

    function buyNow() {
      if (!validateVariant()) return;
      const p = currentPrice();
      const name = encodeURIComponent(product.title + getVariantLabel());
      window.location.href = `/checkout?name=${name}&amount=${p}&qty=${qty}&handle=${encodeURIComponent(product.handle)}`;
    }

    function showNotFound() {
      document.getElementById('product-root').innerHTML = `
        <div class="not-found">
          <p style="font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-bottom:16px;">Product not found</p>
          <a href="/catalog" style="font-size:13px;text-decoration:underline;">← Back to catalog</a>
        </div>`;
    }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function openSearch() {
      document.getElementById('search-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
      setTimeout(() => document.getElementById('search-input').focus(), 50);
    }
    function closeSearch(e) {
      if (e && e.target !== document.getElementById('search-overlay')) return;
      document.getElementById('search-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }
    function handleSearchKey(e) {
      if (e.key === 'Escape') { closeSearch(); return; }
      if (e.key === 'Enter') {
        const q = document.getElementById('search-input').value.trim();
        if (q) location.href = '/catalog?q=' + encodeURIComponent(q);
      }
    }

    init();
  </script>
</body>
</html>
